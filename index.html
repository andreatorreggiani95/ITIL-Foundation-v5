<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>ITIL v5 Foundation - Simulator V1.0</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" href="./icon-512.png">
    <link rel="apple-touch-icon" href="./icon-512.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ITIL v5">
    <meta name="theme-color" content="#0f172a">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #7c3aed;
            --secondary: #a78bfa; --text: #f1f5f9; --text-dim: #94a3b8;
            --success: #22c55e; --danger: #ef4444; --accent: #f59e0b;
            --warning: #facc15;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { max-width: 1000px; width: 100%; background: var(--card); padding: 30px; border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); min-height: 90vh; position: relative; }
        nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .screen { display: none; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn { background: #334155; color: white; border: none; padding: 20px; border-radius: 16px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .btn:hover { background: #475569; transform: translateY(-2px); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        .ai-toggle-container { background: rgba(124, 58, 237, 0.1); border: 1px solid var(--primary); padding: 15px; border-radius: 16px; margin-top: 20px; display: flex; align-items: center; justify-content: space-between; }
        .ai-toggle-container label { font-weight: 600; font-size: 0.95rem; }
        .toggle-switch { position: relative; width: 50px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #475569; border-radius: 26px; transition: 0.3s; }
        .toggle-slider::before { content: ''; position: absolute; height: 20px; width: 20px; bottom: 3px; left: 3px; background: white; border-radius: 50%; transition: 0.3s; }
        .toggle-switch input:checked + .toggle-slider { background: var(--primary); }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(24px); }
        .hard-toggle-container { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); padding: 15px; border-radius: 16px; margin-top: 15px; display: flex; align-items: center; justify-content: space-between; }
        .hard-toggle-container label { font-weight: 600; font-size: 0.95rem; color: var(--danger); }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 600; }
        .progress-bar-container { width: 100%; height: 8px; background: #334155; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); transition: width 0.4s ease; border-radius: 8px; }
        .question-box { background: #0f172a; padding: 25px; border-radius: 16px; margin-bottom: 20px; font-size: 1.05rem; line-height: 1.7; }
        .option-btn { display: block; width: 100%; text-align: left; background: #334155; color: white; border: 2px solid transparent; padding: 16px 20px; border-radius: 14px; cursor: pointer; font-size: 0.95rem; margin-bottom: 10px; transition: all 0.2s; }
        .option-btn:hover:not(.disabled) { border-color: var(--primary); background: #3b4c63; }
        .option-btn.selected { border-color: var(--primary); background: rgba(124, 58, 237, 0.2); }
        .option-btn.correct { border-color: var(--success); background: rgba(34, 197, 94, 0.15); }
        .option-btn.wrong { border-color: var(--danger); background: rgba(239, 68, 68, 0.15); }
        .option-btn.disabled { cursor: default; opacity: 0.8; }
        .nav-buttons { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .nav-buttons .btn { flex: 1; min-width: 120px; text-align: center; padding: 14px; }
        .result-card { text-align: center; padding: 40px 20px; }
        .result-score { font-size: 4rem; font-weight: 800; margin: 20px 0; }
        .result-pass { color: var(--success); }
        .result-fail { color: var(--danger); }
        .result-details { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .result-detail-card { background: #0f172a; padding: 15px; border-radius: 12px; }
        .result-detail-card .label { color: var(--text-dim); font-size: 0.85rem; }
        .result-detail-card .value { font-size: 1.4rem; font-weight: 700; margin-top: 5px; }
        .review-item { background: #0f172a; padding: 20px; border-radius: 14px; margin-bottom: 15px; border-left: 4px solid var(--text-dim); }
        .review-item.review-correct { border-left-color: var(--success); }
        .review-item.review-wrong { border-left-color: var(--danger); }
        .explanation-box { background: rgba(124, 58, 237, 0.1); border: 1px solid var(--primary); padding: 12px; border-radius: 10px; margin-top: 10px; font-size: 0.9rem; line-height: 1.5; }
        .history-item { background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.2s; }
        .history-item:hover { background: #1a2536; }
        .history-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
        .badge-pass { background: rgba(34,197,94,0.2); color: var(--success); }
        .badge-fail { background: rgba(239,68,68,0.2); color: var(--danger); }
        .timer { font-weight: 700; color: var(--accent); font-size: 1.1rem; }
        .timer.warning { color: var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .version-badge { font-size: 0.7rem; background: rgba(124,58,237,0.2); color: var(--secondary); padding: 2px 8px; border-radius: 8px; margin-left: 8px; }
        .category-badge { display: inline-block; background: rgba(124,58,237,0.15); color: var(--secondary); padding: 3px 10px; border-radius: 8px; font-size: 0.8rem; margin-bottom: 10px; }
        .btn-cancel { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid var(--danger); }
        .btn-cancel:hover { background: rgba(239,68,68,0.3); }
        @media (max-width: 600px) {
            .app-container { padding: 15px; border-radius: 16px; }
            .btn-grid { grid-template-columns: 1fr; }
            .result-details { grid-template-columns: 1fr; }
            .quiz-header { flex-direction: column; gap: 8px; }
            .nav-buttons { flex-direction: column; }
            .nav-buttons .btn { min-width: unset; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <nav>
        <div class="logo">ITIL v5 Foundation <span class="version-badge">V1.0</span></div>
        <div style="display:flex;gap:10px;">
            <button class="btn" style="padding:8px 16px;font-size:0.85rem;" onclick="showScreen('home')">🏠</button>
            <button class="btn" style="padding:8px 16px;font-size:0.85rem;" onclick="showScreen('history')">📊</button>
        </div>
    </nav>

    <!-- HOME -->
    <div id="home" class="screen active">
        <h2>🎯 Scegli la modalità</h2>
        <div class="btn-grid">
            <button class="btn" onclick="startQuiz(10)">⚡ Super Rapido<br><small>10 domande</small></button>
            <button class="btn" onclick="startQuiz(20)">🚀 Rapido<br><small>20 domande</small></button>
            <button class="btn btn-primary" onclick="startQuiz(40)" style="grid-column: span 2;">📝 Simulazione Completa<br><small>40 domande — 60 minuti | Soglia 65%</small></button>
        </div>
        <div class="ai-toggle-container">
            <label>🤖 Includi domande AI extra</label>
            <div class="toggle-switch">
                <input type="checkbox" id="aiToggle">
                <span class="toggle-slider"></span>
            </div>
        </div>
        <div class="hard-toggle-container">
            <label>🔥 Hard Mode (opzioni mescolate)</label>
            <div class="toggle-switch">
                <input type="checkbox" id="hardToggle">
                <span class="toggle-slider"></span>
            </div>
        </div>
    </div>

    <!-- QUIZ -->
    <div id="quiz" class="screen">
        <div class="quiz-header">
            <span id="qCounter">Domanda 1/40</span>
            <span id="timerDisplay" class="timer"></span>
        </div>
        <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
        <div id="categoryBadge" class="category-badge"></div>
        <div class="question-box" id="questionText"></div>
        <div id="optionsContainer"></div>
        <div class="nav-buttons">
            <button class="btn" id="prevBtn" onclick="prevQuestion()">⬅ Precedente</button>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Successiva ➡</button>
            <button class="btn btn-cancel" onclick="cancelQuiz()">✖ Annulla</button>
        </div>
    </div>

    <!-- RESULT -->
    <div id="result" class="screen">
        <div class="result-card">
            <h2 id="resultTitle"></h2>
            <div id="resultScore" class="result-score"></div>
            <div class="result-details">
                <div class="result-detail-card"><div class="label">Corrette</div><div class="value" id="correctCount" style="color:var(--success)"></div></div>
                <div class="result-detail-card"><div class="label">Errate</div><div class="value" id="wrongCount" style="color:var(--danger)"></div></div>
                <div class="result-detail-card"><div class="label">Tempo</div><div class="value" id="timeTaken"></div></div>
                <div class="result-detail-card"><div class="label">Soglia</div><div class="value">65%</div></div>
            </div>
            <div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
                <button class="btn btn-primary" onclick="showReview()">📋 Rivedi risposte</button>
                <button class="btn" onclick="showScreen('home')">🏠 Home</button>
            </div>
        </div>
    </div>

    <!-- REVIEW -->
    <div id="review" class="screen">
        <h2>📋 Revisione risposte</h2>
        <div id="reviewContainer"></div>
        <button class="btn btn-primary" style="width:100%;margin-top:20px;" onclick="showScreen('result')">⬅ Torna ai risultati</button>
    </div>

    <!-- HISTORY -->
    <div id="history" class="screen">
        <h2>📊 Storico sessioni</h2>
        <div id="historyContainer"></div>
        <button class="btn" style="width:100%;margin-top:20px;" onclick="clearHistory()">🗑 Cancella storico</button>
        <button class="btn btn-primary" style="width:100%;margin-top:10px;" onclick="showScreen('home')">🏠 Home</button>
    </div>

    <!-- HISTORY DETAIL -->
    <div id="historyDetail" class="screen">
        <h2>📋 Dettaglio sessione</h2>
        <div id="historyDetailContainer"></div>
        <button class="btn btn-primary" style="width:100%;margin-top:20px;" onclick="showScreen('history')">⬅ Torna allo storico</button>
    </div>
</div>

<script>
let allQuestions = [], aiQuestions = [], quizQuestions = [], currentQ = 0, userAnswers = [], timerInterval, startTime, endTime;

const CATEGORY_DIST = [
    { cat: "Concetti chiave", pct: 30 },
    { cat: "Catena del valore", pct: 28 },
    { cat: "Principi guida", pct: 12 },
    { cat: "Dimensioni", pct: 11 },
    { cat: "Pratiche di gestione", pct: 5 },
    { cat: "Flussi del valore", pct: 5 },
    { cat: "Governance", pct: 3 },
    { cat: "Miglioramento continuo", pct: 3 },
    { cat: "Sistema del valore", pct: 2 },
    { cat: "Integrazione framework", pct: 1 }
];

async function loadQuestions() {
    try {
        const r1 = await fetch('./questions.json');
        allQuestions = await r1.json();
    } catch(e) { allQuestions = []; }
    try {
        const r2 = await fetch('./ai_questions.json');
        aiQuestions = await r2.json();
    } catch(e) { aiQuestions = []; }
}
loadQuestions();

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'history') renderHistory();
    if (id === 'home' && timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function shuffle(arr) { for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }

function selectByCategory(pool, total) {
    let selected = [];
    let byCategory = {};
    pool.forEach(q => { if(!byCategory[q.category]) byCategory[q.category]=[]; byCategory[q.category].push(q); });
    Object.keys(byCategory).forEach(k => byCategory[k] = shuffle([...byCategory[k]]));

    for(let d of CATEGORY_DIST) {
        let need = Math.round(total * d.pct / 100);
        let available = byCategory[d.cat] || [];
        selected.push(...available.slice(0, need));
    }

    if(selected.length < total) {
        let usedIds = new Set(selected.map(q=>q.id));
        let remaining = pool.filter(q => !usedIds.has(q.id));
        shuffle(remaining);
        selected.push(...remaining.slice(0, total - selected.length));
    }

    return shuffle(selected.slice(0, total));
}

function startQuiz(count) {
    const useAi = document.getElementById('aiToggle').checked;
    const hardMode = document.getElementById('hardToggle').checked;
    let pool = [...allQuestions];
    if(useAi && aiQuestions.length > 0) pool = pool.concat(aiQuestions);

    quizQuestions = selectByCategory(pool, count);

    if(hardMode) {
        quizQuestions = quizQuestions.map(q => {
            let opts = [...q.options];
            let correctText = opts.find(o => o.startsWith(q.correct_answer + '.'));
            shuffle(opts);
            let newCorrect = String.fromCharCode(65 + opts.indexOf(correctText));
            opts = opts.map((o, i) => String.fromCharCode(65 + i) + '. ' + o.substring(3));
            return { ...q, options: opts, correct_answer: newCorrect };
        });
    }

    currentQ = 0;
    userAnswers = new Array(quizQuestions.length).fill(null);
    startTime = Date.now();

    if(count === 40) {
        let seconds = 60 * 60;
        document.getElementById('timerDisplay').textContent = formatTime(seconds);
        timerInterval = setInterval(() => {
            seconds--;
            document.getElementById('timerDisplay').textContent = formatTime(seconds);
            if(seconds <= 300) document.getElementById('timerDisplay').classList.add('warning');
            if(seconds <= 0) { clearInterval(timerInterval); finishQuiz(); }
        }, 1000);
    } else {
        document.getElementById('timerDisplay').textContent = '';
    }

    showScreen('quiz');
    renderQuestion();
}

function formatTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

function renderQuestion() {
    const q = quizQuestions[currentQ];
    document.getElementById('qCounter').textContent = `Domanda ${currentQ+1}/${quizQuestions.length}`;
    document.getElementById('progressBar').style.width = `${((currentQ+1)/quizQuestions.length)*100}%`;
    document.getElementById('categoryBadge').textContent = q.category;
    document.getElementById('questionText').textContent = q.question;

    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';
    q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        const letter = String.fromCharCode(65 + i);
        if(userAnswers[currentQ] === letter) btn.classList.add('selected');
        btn.onclick = () => selectAnswer(letter);
        container.appendChild(btn);
    });

    document.getElementById('prevBtn').style.display = currentQ > 0 ? 'block' : 'none';
    document.getElementById('nextBtn').textContent = currentQ === quizQuestions.length - 1 ? '✅ Termina' : 'Successiva ➡';
}

function selectAnswer(letter) {
    userAnswers[currentQ] = letter;
    document.querySelectorAll('.option-btn').forEach((btn, i) => {
        btn.classList.remove('selected');
        if(String.fromCharCode(65+i) === letter) btn.classList.add('selected');
    });
}

function nextQuestion() {
    if(currentQ < quizQuestions.length - 1) { currentQ++; renderQuestion(); }
    else finishQuiz();
}
function prevQuestion() { if(currentQ > 0) { currentQ--; renderQuestion(); } }

function cancelQuiz() {
    if(confirm('Sei sicuro di voler annullare il quiz?')) {
        if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        showScreen('home');
    }
}

function finishQuiz() {
    if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    endTime = Date.now();
    let correct = 0;
    quizQuestions.forEach((q, i) => { if(userAnswers[i] === q.correct_answer) correct++; });
    const total = quizQuestions.length;
    const pct = Math.round((correct/total)*100);
    const passed = pct >= 65;
    const elapsed = Math.round((endTime - startTime)/1000);

    document.getElementById('resultTitle').textContent = passed ? '🎉 Superato!' : '❌ Non superato';
    document.getElementById('resultScore').textContent = `${pct}%`;
    document.getElementById('resultScore').className = `result-score ${passed ? 'result-pass' : 'result-fail'}`;
    document.getElementById('correctCount').textContent = `${correct}/${total}`;
    document.getElementById('wrongCount').textContent = `${total-correct}/${total}`;
    document.getElementById('timeTaken').textContent = formatTime(elapsed);

    saveHistory({ date: new Date().toLocaleString('it-IT'), score: pct, correct, total, passed, time: formatTime(elapsed), questions: quizQuestions, answers: userAnswers });
    showScreen('result');
}

function showReview() {
    const container = document.getElementById('reviewContainer');
    container.innerHTML = '';
    quizQuestions.forEach((q, i) => {
        const isCorrect = userAnswers[i] === q.correct_answer;
        const div = document.createElement('div');
        div.className = `review-item ${isCorrect ? 'review-correct' : 'review-wrong'}`;
        let html = `<strong>D${i+1}.</strong> <span class="category-badge">${q.category}</span><br>${q.question}<br><br>`;
        q.options.forEach(opt => {
            const letter = opt.charAt(0);
            let icon = '';
            if(letter === q.correct_answer) icon = '✅';
            else if(letter === userAnswers[i] && !isCorrect) icon = '❌';
            html += `<div style="margin:4px 0;${letter===q.correct_answer?'color:var(--success);font-weight:600;':''}${letter===userAnswers[i]&&!isCorrect?'color:var(--danger);':''}"> ${icon} ${opt}</div>`;
        });
        if(!userAnswers[i]) html += `<div style="color:var(--accent);margin-top:5px;">⚠ Nessuna risposta data</div>`;
        if(q.explanation) html += `<div class="explanation-box">💡 ${q.explanation}</div>`;
        div.innerHTML = html;
        container.appendChild(div);
    });
    showScreen('review');
}

function saveHistory(entry) {
    let h = JSON.parse(localStorage.getItem('itil_history') || '[]');
    h.unshift(entry);
    if(h.length > 50) h = h.slice(0, 50);
    localStorage.setItem('itil_history', JSON.stringify(h));
}

function renderHistory() {
    const h = JSON.parse(localStorage.getItem('itil_history') || '[]');
    const container = document.getElementById('historyContainer');
    if(h.length === 0) { container.innerHTML = '<p style="color:var(--text-dim);">Nessuna sessione registrata.</p>'; return; }
    container.innerHTML = '';
    h.forEach((entry, idx) => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `<div><strong>${entry.date}</strong><br><small>${entry.correct}/${entry.total} — ${entry.time}</small></div><span class="history-badge ${entry.passed?'badge-pass':'badge-fail'}">${entry.score}%</span>`;
        div.onclick = () => showHistoryDetail(idx);
        container.appendChild(div);
    });
}

function showHistoryDetail(idx) {
    const h = JSON.parse(localStorage.getItem('itil_history') || '[]');
    const entry = h[idx];
    if(!entry || !entry.questions) { alert('Dettagli non disponibili'); return; }
    const container = document.getElementById('historyDetailContainer');
    container.innerHTML = `<div style="text-align:center;margin-bottom:20px;"><span class="history-badge ${entry.passed?'badge-pass':'badge-fail'}" style="font-size:1.2rem;padding:8px 20px;">${entry.score}% — ${entry.passed?'Superato':'Non superato'}</span><br><small>${entry.date} | ${entry.correct}/${entry.total} | ${entry.time}</small></div>`;
    entry.questions.forEach((q, i) => {
        const ans = entry.answers[i];
        const isCorrect = ans === q.correct_answer;
        const div = document.createElement('div');
        div.className = `review-item ${isCorrect ? 'review-correct' : 'review-wrong'}`;
        let html = `<strong>D${i+1}.</strong> <span class="category-badge">${q.category}</span><br>${q.question}<br><br>`;
        q.options.forEach(opt => {
            const letter = opt.charAt(0);
            let icon = '';
            if(letter === q.correct_answer) icon = '✅';
            else if(letter === ans && !isCorrect) icon = '❌';
            html += `<div style="margin:4px 0;${letter===q.correct_answer?'color:var(--success);font-weight:600;':''}${letter===ans&&!isCorrect?'color:var(--danger);':''}"> ${icon} ${opt}</div>`;
        });
        if(!ans) html += `<div style="color:var(--accent);margin-top:5px;">⚠ Nessuna risposta data</div>`;
        if(q.explanation) html += `<div class="explanation-box">💡 ${q.explanation}</div>`;
        div.innerHTML = html;
        container.appendChild(div);
    });
    showScreen('historyDetail');
}

function clearHistory() {
    if(confirm('Cancellare tutto lo storico?')) {
        localStorage.removeItem('itil_history');
        renderHistory();
    }
}

if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js').catch(e => console.log('SW registration failed', e));
}
</script>
</body>
</html>
